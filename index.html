<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Tailwind CSS Playground</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }

    .sidebar-link { transition: all 0.15s ease; }
    .sidebar-link:hover { background: rgba(59,130,246,0.1); }
    .sidebar-link.active { background: rgba(59,130,246,0.2); color: #60a5fa; border-right: 2px solid #3b82f6; }

    .preview-box { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
    .preview-box > * { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }

    .code-block { background: #0f172a; border-radius: 0.5rem; overflow: hidden; }
    .code-block pre { overflow-x: auto; padding: 1rem; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.8125rem; line-height: 1.6; }

    .slider-input { -webkit-appearance: none; appearance: none; height: 6px; background: #334155; border-radius: 3px; outline: none; }
    .slider-input::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #3b82f6; cursor: pointer; border: 2px solid #1e293b; transition: transform 0.15s; }
    .slider-input::-webkit-slider-thumb:hover { transform: scale(1.2); }
    .slider-input::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: #3b82f6; cursor: pointer; border: 2px solid #1e293b; }

    .btn-option { padding: 0.375rem 0.75rem; border-radius: 0.375rem; font-size: 0.8125rem; font-weight: 500; transition: all 0.2s; border: 1px solid transparent; cursor: pointer; user-select: none; }
    .btn-option.active { background: #3b82f6; color: white; border-color: #3b82f6; }
    .btn-option:not(.active) { background: #1e293b; color: #94a3b8; border-color: #334155; }
    .btn-option:not(.active):hover { background: #334155; color: #e2e8f0; }
    .btn-option:focus-visible { outline: 2px solid #60a5fa; outline-offset: 2px; }

    .responsive-frame { transition: all 0.4s cubic-bezier(0.4,0,0.2,1); overflow: auto; border-radius: 0.5rem; background: white; }

    .spacing-visual { position: relative; }
    .spacing-margin { border: 3px dashed #ef4444; }
    .spacing-border { border: 3px solid #f59e0b; }
    .spacing-padding { border: 3px dashed #22c55e; }
    .spacing-content { background: #3b82f6; color: white; text-align: center; padding: 0.5rem; font-weight: 600; border-radius: 2px; }

    .hover-card { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); cursor: pointer; }
    .hover-card:hover { transform: scale(1.05) rotate(0deg); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); }

    .grid-cell { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); display: flex; align-items: center; justify-content: center; border-radius: 0.375rem; font-weight: 600; font-size: 0.75rem; color: white; min-height: 40px; }

    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .slide-enter { animation: slideIn 0.25s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }

    .badge { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.125rem 0.5rem; border-radius: 9999px; font-size: 0.6875rem; font-weight: 500; }

    .progress-dot { width: 8px; height: 8px; border-radius: 50%; transition: all 0.3s; }

    .copy-btn { position: absolute; top: 0.5rem; right: 0.5rem; padding: 0.25rem 0.5rem; font-size: 0.6875rem; border-radius: 0.25rem; background: #1e293b; color: #94a3b8; border: 1px solid #334155; cursor: pointer; transition: all 0.15s; }
    .copy-btn:hover { background: #334155; color: #e2e8f0; }

    .pos-demo-container { position: relative; height: 240px; background: #1e293b; border-radius: 0.5rem; overflow: hidden; }
    .pos-label { position: absolute; padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 600; white-space: nowrap; transition: all 0.4s cubic-bezier(0.4,0,0.2,1); }

    .overflow-demo-content { width: 300px; height: 120px; position: relative; }

    .tab-btn { padding: 0.5rem 1rem; border-radius: 0.375rem; font-size: 0.8125rem; font-weight: 500; transition: all 0.2s; cursor: pointer; }
    .tab-btn.active { background: #3b82f6; color: white; }
    .tab-btn:not(.active) { color: #94a3b8; }
    .tab-btn:not(.active):hover { color: #e2e8f0; background: #1e293b; }

    /* Code dock - slides up from bottom */
    #codeDock {
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.25s;
      transform: translateY(100%);
      opacity: 0;
    }
    #codeDock.visible {
      transform: translateY(0);
      opacity: 1;
    }
    #codeDock code { font-family: 'JetBrains Mono', 'Fira Code', monospace; }

    .key-hint { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 3px; background: #334155; color: #94a3b8; font-size: 10px; font-weight: 600; margin-right: 4px; }

    @media (max-width: 768px) {
      .sidebar-open #sidebar { transform: translateX(0); }
    }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 antialiased">
  <div id="app" class="flex min-h-screen">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 shrink-0 border-r border-slate-700/50 bg-slate-900/95 backdrop-blur flex flex-col fixed md:sticky top-0 left-0 h-screen z-50 md:z-auto transition-transform duration-300 -translate-x-full md:translate-x-0">
      <div class="p-4 border-b border-slate-700/50">
        <div class="flex items-center gap-2 mb-3">
          <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
          <h1 class="font-bold text-sm">Tailwind Playground</h1>
        </div>
        <div class="relative">
          <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input id="searchInput" type="text" placeholder="Search classes, CSS, terms..." class="w-full bg-slate-800 text-sm text-slate-200 placeholder-slate-500 rounded-lg pl-8 pr-3 py-2 border border-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all" />
        </div>
      </div>
      <nav id="categoryList" class="flex-1 overflow-y-auto p-2 space-y-0.5 text-sm">
        <!-- populated by JS -->
      </nav>
      <div class="p-4 border-t border-slate-700/50">
        <div class="flex items-center gap-2 mb-1">
          <span class="text-xs text-slate-400">Progress</span>
          <span id="progressText" class="text-xs text-blue-400 font-medium ml-auto">0%</span>
        </div>
        <div class="w-full bg-slate-800 rounded-full h-1.5 overflow-hidden">
          <div id="progressBar" class="h-full bg-blue-500 rounded-full transition-all duration-500" style="width:0%"></div>
        </div>
      </div>
    </aside>

    <!-- Mobile overlay -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden" onclick="toggleSidebar()"></div>

    <!-- Main Content -->
    <main class="flex-1 min-w-0 ml-0 md:ml-64 flex flex-col">
      <!-- Mobile header -->
      <header class="md:hidden flex items-center gap-3 p-3 border-b border-slate-700/50 bg-slate-900/95 sticky top-0 z-30">
        <button onclick="toggleSidebar()" class="p-1.5 hover:bg-slate-800 rounded-lg transition-colors" aria-label="Toggle sidebar">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <span class="font-semibold text-sm">Tailwind Playground</span>
      </header>

      <div id="contentArea" class="p-4 md:p-6 max-w-5xl mx-auto flex-1">
        <!-- Content rendered by JS -->
        <div id="welcomeSection" class="fade-in">
          <div class="text-center py-16">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-500/10 mb-6">
              <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <h2 class="text-3xl font-bold mb-3">Interactive Tailwind CSS Playground</h2>
            <p class="text-slate-400 max-w-lg mx-auto mb-8">Learn Tailwind CSS visually. Click a category on the left to start exploring utilities with live previews, interactive demos, and real-time code.</p>
            <div class="flex flex-wrap justify-center gap-3">
              <button onclick="navigateTo('flexbox')" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-500 rounded-lg font-medium transition-colors text-sm">Start with Flexbox →</button>
              <button onclick="navigateTo('grid')" class="px-5 py-2.5 bg-slate-800 hover:bg-slate-700 rounded-lg font-medium transition-colors text-sm">Grid Playground</button>
              <button onclick="navigateTo('transform')" class="px-5 py-2.5 bg-slate-800 hover:bg-slate-700 rounded-lg font-medium transition-colors text-sm">Transform Lab</button>
              <button onclick="navigateTo('twplay')" class="px-5 py-2.5 bg-slate-800 hover:bg-slate-700 rounded-lg font-medium transition-colors text-sm">🎮 Tailwind Play</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Floating Code Dock -->
      <div id="codeDock" class="sticky bottom-0 z-40 bg-slate-900/95 backdrop-blur border-t border-slate-700/50">
        <div class="max-w-5xl mx-auto px-4 py-2">
          <div class="flex items-center justify-between mb-1">
            <div class="flex items-center gap-2 text-xs text-slate-400">
              <span class="font-medium text-slate-300">Active Classes</span>
              <span class="text-slate-600">|</span>
              <button class="tab-btn-xs active" data-dock-tab="tw" onclick="dockSwitchTab(this,'tw')">Tailwind</button>
              <button class="tab-btn-xs" data-dock-tab="css" onclick="dockSwitchTab(this,'css')">CSS</button>
            </div>
            <div class="flex items-center gap-2">
              <span id="dockSource" class="text-[10px] text-slate-600"></span>
              <button id="dockCopyBtn" onclick="dockCopy(this)" class="text-xs text-slate-400 hover:text-slate-200 px-2 py-0.5 rounded hover:bg-slate-800 transition-colors flex items-center gap-1">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
                Copy
              </button>
            </div>
          </div>
          <div class="relative">
            <pre class="overflow-x-auto max-h-20 scroll-py-1"><code id="dockCode" class="block text-xs text-emerald-300 font-mono whitespace-pre-wrap break-all leading-relaxed"></code></pre>
            <button id="dockExpandBtn" onclick="dockExpand()" class="absolute right-1 bottom-1 text-[10px] text-slate-600 hover:text-slate-400 px-1 rounded transition-colors" title="Expand">▼</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Invisible bridge for switching dock tabs -->
  <style>
    .tab-btn-xs { padding: 1px 6px; border-radius: 3px; font-size: 11px; transition: all 0.15s; cursor: pointer; color: #64748b; }
    .tab-btn-xs.active { background: #334155; color: #e2e8f0; }
    .tab-btn-xs:not(.active):hover { color: #94a3b8; }
  </style>

  <script>
    // ===== DATA =====
    const categories = [
      { id: 'typography', name: 'Typography', icon: 'Aa' },
      { id: 'colors', name: 'Colors', icon: '🎨' },
      { id: 'backgrounds', name: 'Backgrounds', icon: '🖼' },
      { id: 'width', name: 'Width', icon: '↔' },
      { id: 'height', name: 'Height', icon: '↕' },
      { id: 'margin', name: 'Margin', icon: '⊞' },
      { id: 'padding', name: 'Padding', icon: '⊟' },
      { id: 'border', name: 'Border', icon: '▢' },
      { id: 'borderRadius', name: 'Border Radius', icon: '⬡' },
      { id: 'display', name: 'Display', icon: '⊡' },
      { id: 'flexbox', name: 'Flexbox', icon: '≡' },
      { id: 'grid', name: 'Grid', icon: '⊞' },
      { id: 'position', name: 'Position', icon: '⊕' },
      { id: 'overflow', name: 'Overflow', icon: '↘' },
      { id: 'shadow', name: 'Shadow', icon: '◑' },
      { id: 'opacity', name: 'Opacity', icon: '◎' },
      { id: 'cursor', name: 'Cursor', icon: '↖' },
      { id: 'hover', name: 'Hover', icon: '👆' },
      { id: 'transition', name: 'Transition', icon: '▶' },
      { id: 'transform', name: 'Transform', icon: '◈' },
      { id: 'twplay', name: 'Tailwind Play', icon: '🎮' },
      { id: 'responsive', name: 'Responsive', icon: '📱' },
      { id: 'zIndex', name: 'Z-index', icon: '⬒' },
      { id: 'sizing', name: 'Sizing', icon: '📐' },
      { id: 'spacing', name: 'Spacing', icon: '📏' },
      { id: 'lists', name: 'Lists', icon: '📋' },
      { id: 'tables', name: 'Tables', icon: '⊞' },
      { id: 'objectFit', name: 'Object Fit', icon: '🖼' },
      { id: 'filters', name: 'Filters', icon: '🔍' }
    ];

    const searchData = [
      { id: 'typography', terms: ['text', 'font', 'size', 'leading', 'tracking', 'typography', 'letter spacing', 'line height', 'weight', 'bold', 'italic'] },
      { id: 'colors', terms: ['color', 'text color', 'bg color', 'red', 'blue', 'green', 'slate', 'gray', 'hex', 'rgb'] },
      { id: 'backgrounds', terms: ['background', 'bg', 'image', 'gradient', 'cover', 'contain'] },
      { id: 'width', terms: ['width', 'w-', 'full', 'screen', 'min-width', 'max-width', 'size'] },
      { id: 'height', terms: ['height', 'h-', 'full', 'screen', 'min-height', 'max-height'] },
      { id: 'margin', terms: ['margin', 'm-', 'space', 'mx', 'my', 'mt', 'mr', 'mb', 'ml', 'gap'] },
      { id: 'padding', terms: ['padding', 'p-', 'px', 'py', 'pt', 'pr', 'pb', 'pl'] },
      { id: 'border', terms: ['border', 'border width', 'border style', 'border color', 'solid', 'dashed', 'dotted'] },
      { id: 'borderRadius', terms: ['border radius', 'rounded', 'circle', 'pill', 'corner'] },
      { id: 'display', terms: ['display', 'block', 'inline', 'hidden', 'flex', 'grid', 'inline-block', 'inline-flex'] },
      { id: 'flexbox', terms: ['flex', 'flexbox', 'justify', 'items', 'align', 'content', 'row', 'col', 'wrap', 'center', 'between', 'around'] },
      { id: 'grid', terms: ['grid', 'columns', 'rows', 'col-span', 'row-span', 'gap', 'template'] },
      { id: 'position', terms: ['position', 'absolute', 'relative', 'fixed', 'sticky', 'static', 'top', 'left', 'right', 'bottom', 'z-index'] },
      { id: 'overflow', terms: ['overflow', 'scroll', 'hidden', 'auto', 'visible', 'clip'] },
      { id: 'shadow', terms: ['shadow', 'box-shadow', 'elevation', 'drop shadow'] },
      { id: 'opacity', terms: ['opacity', 'transparent', 'fade', 'alpha', '0', '50', '75', '100'] },
      { id: 'cursor', terms: ['cursor', 'pointer', 'click', 'grab', 'move', 'not-allowed', 'wait'] },
      { id: 'hover', terms: ['hover', 'state', 'interaction', 'on hover', 'pseudo'] },
      { id: 'transition', terms: ['transition', 'animate', 'duration', 'delay', 'ease', 'timing', 'property'] },
      { id: 'transform', terms: ['transform', 'scale', 'rotate', 'translate', 'skew', 'matrix'] },
      { id: 'twplay', terms: ['play', 'playground', 'live', 'realtime', 'edit', 'preview', 'tailwind play', 'test', 'try', 'experiment'] },
      { id: 'responsive', terms: ['responsive', 'breakpoint', 'mobile', 'tablet', 'desktop', 'sm', 'md', 'lg', 'xl', 'adapt'] },
      { id: 'zIndex', terms: ['z-index', 'z-', 'stack', 'layer', 'depth'] },
      { id: 'sizing', terms: ['w-', 'h-', 'size', 'width', 'height', 'min-w', 'max-w', 'min-h', 'max-h'] },
      { id: 'spacing', terms: ['padding', 'margin', 'gap', 'space', 'p-', 'm-', 'spacing'] },
      { id: 'lists', terms: ['list', 'ul', 'ol', 'disc', 'decimal', 'list-style'] },
      { id: 'tables', terms: ['table', 'border-collapse', 'table-auto', 'table-fixed'] },
      { id: 'objectFit', terms: ['object-fit', 'object-position', 'cover', 'contain', 'fill', 'image'] },
      { id: 'filters', terms: ['filter', 'blur', 'brightness', 'contrast', 'grayscale', 'hue', 'saturate', 'sepia'] }
    ];

    // ===== STATE =====
    let currentCategory = null;
    let viewedCategories = new Set();

    // ===== SIDEBAR =====
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      sidebar.classList.toggle('-translate-x-full');
      overlay.classList.toggle('hidden');
    }

    function renderSidebar() {
      const list = document.getElementById('categoryList');
      list.innerHTML = categories.map(c => `
        <button onclick="navigateTo('${c.id}')" id="nav-${c.id}" class="sidebar-link w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-slate-400 text-left" tabindex="0">
          <span class="w-5 text-center text-xs">${c.icon}</span>
          <span>${c.name}</span>
          <span id="dot-${c.id}" class="progress-dot ml-auto ${viewedCategories.has(c.id) ? 'bg-blue-500' : 'bg-slate-700'}"></span>
        </button>
      `).join('');
      // Keyboard nav on sidebar
      list.addEventListener('keydown', function(e) {
        const items = [...this.querySelectorAll('.sidebar-link')];
        const idx = items.indexOf(document.activeElement);
        if (e.key === 'ArrowDown') { e.preventDefault(); items[Math.min(idx+1, items.length-1)]?.focus(); }
        if (e.key === 'ArrowUp') { e.preventDefault(); items[Math.max(idx-1, 0)]?.focus(); }
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); document.activeElement?.click(); }
      });
    }

    function updateProgress() {
      const pct = Math.round((viewedCategories.size / categories.length) * 100);
      document.getElementById('progressText').textContent = pct + '%';
      document.getElementById('progressBar').style.width = pct + '%';
    }

    // ===== NAVIGATION =====
    function navigateTo(id) {
      const section = document.getElementById('section-' + id);
      if (!section) return;

      document.getElementById('welcomeSection').style.display = 'none';
      document.querySelectorAll('.category-section').forEach(s => s.style.display = 'none');
      section.style.display = 'block';

      document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
      const navBtn = document.getElementById('nav-' + id);
      if (navBtn) navBtn.classList.add('active');

      viewedCategories.add(id);
      const dot = document.getElementById('dot-' + id);
      if (dot) dot.className = 'progress-dot ml-auto bg-blue-500';
      updateProgress();

      currentCategory = id;

      if (window.innerWidth < 768) {
        document.getElementById('sidebar').classList.add('-translate-x-full');
        document.getElementById('sidebarOverlay').classList.add('hidden');
      }

      window.scrollTo({ top: 0, behavior: 'smooth' });
      // Trigger code dock refresh after section switch
      setTimeout(dockRefresh, 100);
    }

    // ===== SEARCH =====
    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', function() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        const q = this.value.toLowerCase().trim();
        if (!q) {
          document.querySelectorAll('.sidebar-link').forEach(l => l.style.display = 'flex');
          if (currentCategory) navigateTo(currentCategory);
          return;
        }

        const results = searchData.filter(d =>
          d.terms.some(t => t.includes(q)) || d.id.includes(q)
        ).map(d => d.id);

        document.querySelectorAll('.sidebar-link').forEach(l => {
          const id = l.id.replace('nav-', '');
          l.style.display = results.includes(id) ? 'flex' : 'none';
        });

        if (results.length > 0) {
          navigateTo(results[0]);
        }
      }, 150);
    });

    // ===== COPY FUNCTION =====
    window.copyCode = function(el) {
      const code = el.parentElement.querySelector('code').textContent;
      navigator.clipboard.writeText(code).then(() => {
        el.textContent = 'Copied!';
        setTimeout(() => { el.textContent = 'Copy'; }, 1500);
      });
    };

    // ===== BUILD SECTIONS =====
    function buildAllSections() {
      const area = document.getElementById('contentArea');
      const sections = [
        buildTypography(),
        buildColors(),
        buildBackgrounds(),
        buildWidth(),
        buildHeight(),
        buildMargin(),
        buildPadding(),
        buildBorderSec(),
        buildBorderRadius(),
        buildDisplay(),
        buildFlexbox(),
        buildGrid(),
        buildPosition(),
        buildOverflow(),
        buildShadow(),
        buildOpacity(),
        buildCursor(),
        buildHover(),
        buildTransition(),
        buildTransform(),
        buildResponsive(),
        buildZIndex(),
        buildSizing(),
        buildSpacing(),
        buildLists(),
        buildTables(),
        buildObjectFit(),
        buildFilters(),
        buildTwPlay()
      ];
      sections.forEach(s => { if (s) area.appendChild(s); });
    }

    // ===== UTILITY HELPERS =====
    function codeViewer(html, tailwindClasses, cssEquivalent) {
      const div = document.createElement('div');
      div.className = 'code-block relative mt-3';
      div.innerHTML = `
        <div class="flex border-b border-slate-800">
          <button class="tab-btn active" onclick="switchCodeTab(this,'html')">HTML</button>
          <button class="tab-btn" onclick="switchCodeTab(this,'tw')">Tailwind</button>
          <button class="tab-btn" onclick="switchCodeTab(this,'css')">CSS</button>
        </div>
        <div class="code-tab" data-tab="html"><pre><code class="text-slate-300">${escapeHtml(html)}</code></pre></div>
        <div class="code-tab hidden" data-tab="tw"><pre><code class="text-emerald-300">${escapeHtml(tailwindClasses)}</code></pre></div>
        <div class="code-tab hidden" data-tab="css"><pre><code class="text-amber-300">${escapeHtml(cssEquivalent)}</code></pre></div>
        <button class="copy-btn" onclick="copyCode(this)">Copy</button>
      `;
      return div;
    }

      if (preview) {

        const altPreview = section?.querySelector('[id*="Preview"], [id*="preview"], [id*="Demo"], [id*="demo"]');

    function dockUpdate(el) {
      const dock = document.getElementById('codeDock');
      const code = document.getElementById('dockCode');
      const source = document.getElementById('dockSource');
      if (!dock || !code) return;

      // Extract meaningful classes (filter out structural ones)
      const ignored = ['preview-box','bg-slate-900/70','rounded-lg','p-4','border','border-slate-700/30',
        'transition-all','duration-300','fade-in','ease'];
      const classes = Array.from(el.classList).filter(c => !ignored.some(i => c.includes(i))).join(' ').trim();

      // Get CSS equivalent (simple map for common classes)
      const cssLines = classes.split(/\s+/).map(cls => {
        const mapping = twToCss(cls);
        return mapping ? `  ${mapping}` : null;
      }).filter(Boolean);

      const tailwindText = classes || el.className.split(/\s+/).slice(0,6).join(' ');
      const cssText = cssLines.length ? `/* Tailwind classes */\n${cssLines.join('\n')}` : '/* no CSS mapping available */';

      // Switch based on active tab
      const activeTab = dock.querySelector('.tab-btn-xs.active');
      const isCss = activeTab?.dataset?.dockTab === 'css';
      code.textContent = isCss ? cssText : tailwindText;

      // Store full text for copy
      code.dataset.tw = tailwindText;
      code.dataset.css = cssText;
      code.dataset.activeTab = isCss ? 'css' : 'tw';

      // Show source label
      const sectionId = el.closest('.category-section')?.id?.replace('section-', '') || currentCategory || '';
      source.textContent = sectionId ? `from: ${sectionId}` : '';

      dock.classList.add('visible');
    }

    function dockHide() {

    function twToCss(cls) {
      // Common Tailwind → CSS mappings
      if (cls.startsWith('text-') && !cls.startsWith('text-') && !['left','center','right','justify'].includes(cls.replace('text-',''))) {
        const size = cls.replace('text-','');
        const sizes = {xs:'0.75rem',sm:'0.875rem',base:'1rem',lg:'1.125rem',xl:'1.25rem','2xl':'1.5rem','3xl':'1.875rem','4xl':'2.25rem','5xl':'3rem','6xl':'3.75rem'};
        return sizes[size] ? `font-size: ${sizes[size]};` : null;
      }
      if (cls.startsWith('font-')) {
        const w = cls.replace('font-','');
        const weights = {thin:'100',extralight:'200',light:'300',normal:'400',medium:'500',semibold:'600',bold:'700',extrabold:'800',black:'900'};
        return weights[w] ? `font-weight: ${weights[w]};` : null;
      }
      if (cls.startsWith('text-') && ['left','center','right','justify'].includes(cls.replace('text-',''))) {
        return `text-align: ${cls.replace('text-','')};`;
      }
      if (cls.startsWith('bg-') && !cls.startsWith('bg-gradient')) {
        return `background-color: ${cls.replace('bg-','').replace(/-/g,' ')}; /* approximate */`;
      }
      if (cls.startsWith('p-')) return `padding: ${cls.replace('p-','') * 0.25}rem;`;
      if (cls.startsWith('m-')) return `margin: ${cls.replace('m-','') * 0.25}rem;`;
      if (cls.startsWith('gap-')) return `gap: ${cls.replace('gap-','') * 0.25}rem;`;
      if (cls.startsWith('rounded-')) {
        const r = cls.replace('rounded-','');
        const radii = {none:'0',sm:'0.125rem','':'0.25rem',md:'0.375rem',lg:'0.5rem',xl:'0.75rem','2xl':'1rem','3xl':'1.5rem',full:'9999px'};
        return radii[r] !== undefined ? `border-radius: ${radii[r] || r};` : null;
      }
      if (cls.startsWith('border') && !cls.includes('-')) return `border-width: 1px;`;
      if (cls.match(/^border-\d+/)) return `border-width: ${cls.replace('border-','') * 0.25}rem;`;
      if (cls.startsWith('shadow')) {
        const shadows = {sm:'0 1px 2px 0 rgb(0 0 0 / 0.05)','':'0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1)',
          md:'0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1)',
          lg:'0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1)',
          xl:'0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1)',
          '2xl':'0 25px 50px -12px rgb(0 0 0 / 0.25)',inner:'inset 0 2px 4px 0 rgb(0 0 0 / 0.05)',none:'0 0 #0000'};
        return shadows[cls.replace('shadow-','')] ? `box-shadow: ${shadows[cls.replace('shadow-','')]};` : null;
      }
      if (cls.startsWith('opacity-')) return `opacity: ${cls.replace('opacity-','') / 100};`;
      if (cls.startsWith('w-')) {
        if (cls === 'w-full') return 'width: 100%;';
        if (cls.match(/w-\d+\/\d+/)) { const [n,d] = cls.replace('w-','').split('/'); return `width: ${n/d * 100}%;`; }
        return `width: ${cls.replace('w-','') * 0.25}rem;`;
      }
      if (cls.startsWith('h-')) {
        if (cls === 'h-full') return 'height: 100%;';
        return `height: ${cls.replace('h-','') * 0.25}rem;`;
      }
      if (cls === 'flex') return 'display: flex;';
      if (cls === 'grid') return 'display: grid;';
      if (cls === 'block') return 'display: block;';
      if (cls === 'hidden') return 'display: none;';
      if (cls.startsWith('justify-')) return `justify-content: ${cls.replace('justify-','').replace('start','flex-start').replace('end','flex-end').replace('between','space-between').replace('around','space-around').replace('evenly','space-evenly')};`;
      if (cls.startsWith('items-')) return `align-items: ${cls.replace('items-','').replace('start','flex-start').replace('end','flex-end')};`;
      if (cls.startsWith('flex-')) return `flex-direction: ${cls.replace('flex-','').replace('row','row').replace('col','column')};`;
      if (cls.startsWith('overflow-')) return `overflow: ${cls.replace('overflow-','')};`;
      return null;
    }

    window.transformUpdate = function() {
      const box = document.getElementById('transformBox');
      if (!box) return;
      const scale = document.getElementById('scaleSlider').value / 100;
      const rotate = document.getElementById('rotateSlider').value;
      const transX = document.getElementById('transXSlider').value;
      const transY = document.getElementById('transYSlider').value;
      const skew = document.getElementById('skewSlider').value;

      document.getElementById('scaleVal').textContent = scale.toFixed(1);
      document.getElementById('rotateVal').textContent = rotate;
      document.getElementById('transXVal').textContent = transX;
      document.getElementById('transYVal').textContent = transY;
      document.getElementById('skewVal').textContent = skew;

      box.style.transform = `scale(${scale}) rotate(${rotate}deg) translate(${transX}px, ${transY}px) skewX(${skew}deg)`;
      box.style.transition = 'transform 0.3s cubic-bezier(0.4,0,0.2,1)';

      const twParts = [];
      if (scale !== 1) twParts.push(`scale-${Math.round(scale*100)}`);
      else twParts.push('scale-100');
      if (rotate > 0) twParts.push(`rotate-${rotate}`);
      else twParts.push('rotate-0');
      if (transX !== 0) twParts.push(`translate-x-${transX}`);
      if (transY !== 0) twParts.push(`translate-y-${transY}`);
      if (skew !== 0) twParts.push(`skew-x-${skew}`);

      document.getElementById('transformCodeTw').textContent = twParts.join(' ') || 'scale-100';

      const cssParts = [];
      cssParts.push(`transform: scale(${scale}) rotate(${rotate}deg) translate(${transX}px, ${transY}px) skewX(${skew}deg);`);
      document.getElementById('transformCodeCss').textContent = cssParts.join('\n');
    };

      sec.className = 'category-section';
      sec.style.display = 'none';

      let html = `<h2 class="text-2xl font-bold mb-1">Spacing Playground</h2>
      <p class="text-slate-400 text-sm mb-6">Visually understand the CSS box model: margin, border, padding, and content.</p>`;

      html += `<div class="section-card bg-slate-800/50 rounded-xl border border-slate-700/50 p-4 md:p-6 mb-6 fade-in">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
          <div>
            <label class="text-xs text-slate-400 block mb-2">Margin</label>
            <input type="range" min="0" max="8" value="2" class="slider-input w-full" oninput="spacingUpdate()" id="marginSpacing">
            <span class="text-xs text-slate-500" id="marginVal">m-2</span>
          </div>
          <div>
            <label class="text-xs text-slate-400 block mb-2">Border</label>
            <input type="range" min="0" max="8" value="2" class="slider-input w-full" oninput="spacingUpdate()" id="borderSpacing">
            <span class="text-xs text-slate-500" id="borderVal">border-2</span>
          </div>
          <div>
            <label class="text-xs text-slate-400 block mb-2">Padding</label>
            <input type="range" min="0" max="8" value="2" class="slider-input w-full" oninput="spacingUpdate()" id="paddingSpacing">
            <span class="text-xs text-slate-500" id="paddingVal">p-2</span>
          </div>
        </div>

        <div class="bg-slate-900/70 rounded-lg p-4 border border-slate-700/30 flex justify-center">
          <div id="spacingDemo" data-preview class="spacing-visual m-2 border-2 p-2" style="display:inline-block">
            <div id="spacingMargin" class="spacing-margin transition-all duration-300" style="margin:8px">
              <div id="spacingBorder" class="spacing-border transition-all duration-300" style="border-width:2px;padding:0">
                <div id="spacingPadding" class="spacing-padding transition-all duration-300" style="padding:8px">
                  <div class="spacing-content transition-all duration-300">Content</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="flex flex-wrap gap-4 mt-4 text-xs">
          <div class="flex items-center gap-1.5"><div class="w-3 h-3 border-2 border-dashed border-red-400"></div><span class="text-slate-400">Margin (red)</span></div>
          <div class="flex items-center gap-1.5"><div class="w-3 h-3 border-2 border-solid border-amber-400"></div><span class="text-slate-400">Border (amber)</span></div>
          <div class="flex items-center gap-1.5"><div class="w-3 h-3 border-2 border-dashed border-green-400"></div><span class="text-slate-400">Padding (green)</span></div>
          <div class="flex items-center gap-1.5"><div class="w-3 h-3 bg-blue-500 rounded"></div><span class="text-slate-400">Content (blue)</span></div>
        </div>
      </div>`;

      sec.innerHTML = html;
      return sec;
    }

    window.spacingUpdate = function() {
      const m = parseInt(document.getElementById('marginSpacing').value);
      const b = parseInt(document.getElementById('borderSpacing').value);
      const p = parseInt(document.getElementById('paddingSpacing').value);

      const marginEl = document.getElementById('spacingMargin');
      const borderEl = document.getElementById('spacingBorder');
      const paddingEl = document.getElementById('spacingPadding');

      const px = val => val * 4 + 'px';
      marginEl.style.margin = px(m);
      borderEl.style.borderWidth = px(b);
      paddingEl.style.padding = px(p);

      document.getElementById('marginVal').textContent = `m-${m}`;
      document.getElementById('borderVal').textContent = `border-${b}`;
      document.getElementById('paddingVal').textContent = `p-${p}`;

      // Update data-preview classes so the code dock shows them
      const preview = document.getElementById('spacingDemo');
      preview.className = preview.className.replace(/m-\d+|border-\d+|p-\d+/g, '').trim();
      preview.classList.add(`m-${m}`, `border-${b}`, `p-${p}`);
      };

    // ===== LISTS =====
    function buildLists() {
      const sec = document.createElement('div');
      sec.id = 'section-lists';
      sec.className = 'category-section';
      sec.style.display = 'none';

      let html = `<h2 class="text-2xl font-bold mb-1">Lists</h2>
      <p class="text-slate-400 text-sm mb-6">Style lists with <code class="text-sky-300">list-disc</code>, <code class="text-sky-300">list-decimal</code>, <code class="text-sky-300">list-none</code>, <code class="text-sky-300">list-inside</code>/<code class="text-sky-300">list-outside</code></p>`;

      html += `<div class="section-card bg-slate-800/50 rounded-xl border border-slate-700/50 p-4 md:p-6 mb-6 fade-in">
        <div class="flex flex-wrap gap-2 mb-4">
          ${['list-none','list-disc','list-decimal','list-inside','list-outside'].map((s,i) =>
            `<button class="btn-option ${i===1?'active':''}" onclick="listDemo(this,'${s}')">${s}</button>`
          ).join('')}
        </div>
        <div class="bg-slate-900/70 rounded-lg p-4 border border-slate-700/30">
          <ul data-preview class="list-disc list-inside text-slate-300 space-y-1 text-sm ml-4">
            <li>First item</li>
            <li>Second item with a longer description to demonstrate list styling</li>
            <li>Third item</li>
          </ul>
        </div>
      </div>`;

      sec.innerHTML = html;
      return sec;
    }

    window.listDemo = function(btn, cls) {
      const c = btn.closest('.section-card');
      c.querySelectorAll('.btn-option').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const preview = c.querySelector('[data-preview]');
      if (!preview) return;
      preview.className = preview.className.replace(/list-\w+/g, '').replace(/\s+/g,' ').trim();
      preview.classList.add(cls);
    };

    // ===== TABLES =====
    function buildTables() {
      const sec = document.createElement('div');
      sec.id = 'section-tables';
      sec.className = 'category-section';
      sec.style.display = 'none';

      let html = `<h2 class="text-2xl font-bold mb-1">Tables</h2>
      <p class="text-slate-400 text-sm mb-6">Style tables with <code class="text-sky-300">table-auto</code>, <code class="text-sky-300">table-fixed</code>, <code class="text-sky-300">border-collapse</code></p>`;

      html += `<div class="section-card bg-slate-800/50 rounded-xl border border-slate-700/50 p-4 md:p-6 mb-6 fade-in">
        <div class="flex flex-wrap gap-2 mb-4">
          ${['table-auto','table-fixed','border-collapse','border-separate'].map((s,i) =>
            `<button class="btn-option ${i===0?'active':''}" onclick="tableDemo(this,'${s}')">${s}</button>`
          ).join('')}
        </div>
        <div class="bg-slate-900/70 rounded-lg p-4 border border-slate-700/30 overflow-x-auto">
          <table class="table-auto w-full text-sm text-slate-300 border-collapse">
            <thead>
              <tr class="border-b border-slate-700"><th class="p-2 text-left font-semibold text-slate-200">Name</th><th class="p-2 text-left font-semibold text-slate-200">Role</th><th class="p-2 text-left font-semibold text-slate-200">Status</th></tr>
            </thead>
            <tbody>
              <tr class="border-b border-slate-700/50"><td class="p-2">Alice</td><td class="p-2">Developer</td><td class="p-2"><span class="text-green-400">Active</span></td></tr>
              <tr class="border-b border-slate-700/50"><td class="p-2">Bob</td><td class="p-2">Designer</td><td class="p-2"><span class="text-amber-400">Away</span></td></tr>
              <tr><td class="p-2">Charlie</td><td class="p-2">PM</td><td class="p-2"><span class="text-red-400">Offline</span></td></tr>
            </tbody>
          </table>
        </div>
      </div>`;

      sec.innerHTML = html;
      return sec;
    }

    window.tableDemo = function(btn, cls) {
      const c = btn.closest('.section-card');
      c.querySelectorAll('.btn-option').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const table = c.querySelector('table');
      if (!table) return;
      table.className = table.className.replace(/table-\w+/g, '').replace(/border-\w+/g, '').replace(/\s+/g,' ').trim();
      table.classList.add(cls);
    };

    // ===== OBJECT FIT =====
    function buildObjectFit() {
      const sec = document.createElement('div');
      sec.id = 'section-objectFit';
      sec.className = 'category-section';
      sec.style.display = 'none';

      let html = `<h2 class="text-2xl font-bold mb-1">Object Fit</h2>
      <p class="text-slate-400 text-sm mb-6">Control how images fit their container with <code class="text-sky-300">object-fit</code>.</p>`;

      html += `<div class="section-card bg-slate-800/50 rounded-xl border border-slate-700/50 p-4 md:p-6 mb-6 fade-in">
        <div class="flex flex-wrap gap-2 mb-4">
          ${['object-contain','object-cover','object-fill','object-none','object-scale-down'].map((s,i) =>
            `<button class="btn-option ${i===1?'active':''}" onclick="objectFitDemo(this,'${s}')">${s}</button>`
          ).join('')}
        </div>
        <div class="bg-slate-900/70 rounded-lg p-4 border border-slate-700/30">
          <div class="w-full h-48 bg-slate-800 rounded-lg overflow-hidden flex items-center justify-center relative">
            <div id="objFitImg" class="w-full h-full object-cover" style="background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:3rem">🖼️</div>
          </div>
          <p class="text-xs text-slate-500 mt-2">object-fit controls how replaced content (images, video) fills its box.</p>
        </div>
      </div>`;

      sec.innerHTML = html;
      return sec;
    }

    window.objectFitDemo = function(btn, cls) {
      const c = btn.closest('.section-card');
      c.querySelectorAll('.btn-option').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const img = document.getElementById('objFitImg');
      if (img) {
        img.className = img.className.replace(/object-\w+/g, '').replace(/\s+/g,' ').trim();
        img.classList.add(...cls.split(' '));
      }
    };

    // ===== FILTERS =====
    function buildFilters() {
      const sec = document.createElement('div');
      sec.id = 'section-filters';
      sec.className = 'category-section';
      sec.style.display = 'none';

      let html = `<h2 class="text-2xl font-bold mb-1">Filters</h2>
      <p class="text-slate-400 text-sm mb-6">Apply CSS filters with <code class="text-sky-300">blur</code>, <code class="text-sky-300">brightness</code>, <code class="text-sky-300">grayscale</code>, and more.</p>`;

      html += `<div class="section-card bg-slate-800/50 rounded-xl border border-slate-700/50 p-4 md:p-6 mb-6 fade-in">
        <div class="flex flex-wrap gap-2 mb-4">
          ${['blur-sm','blur','blur-lg','blur-xl','grayscale','grayscale-0','sepia','brightness-150','contrast-150','hue-rotate-60'].map((s,i) =>
            `<button class="btn-option ${i===0?'active':''}" onclick="filterDemo(this,'${s}')">${s}</button>`
          ).join('')}
        </div>
        <div class="bg-slate-900/70 rounded-lg p-4 border border-slate-700/30 flex justify-center">
          <div data-preview class="w-48 h-36 bg-gradient-to-br from-blue-400 via-purple-500 to-pink-500 rounded-xl transition-all duration-300 blur-sm flex items-center justify-center">
            <span class="text-white font-bold">Filter</span>
          </div>
        </div>
      </div>`;

      sec.innerHTML = html;
      return sec;
    }

    window.filterDemo = function(btn, cls) {
      const c = btn.closest('.section-card');
      c.querySelectorAll('.btn-option').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const preview = c.querySelector('[data-preview]');
      if (!preview) return;
      preview.className = preview.className.replace(/blur-\S+/g, '').replace(/grayscale[\S]*/g, '').replace(/sepia/g, '').replace(/brightness-\S+/g, '').replace(/contrast-\S+/g, '').replace(/hue-\S+/g, '').replace(/\s+/g,' ').trim();
      preview.classList.add(cls);
    };

    // ===== TAILWIND PLAY =====
    function buildTwPlay() {
      const sec = document.createElement('div');
      sec.id = 'section-twplay';
      sec.className = 'category-section';
      sec.style.display = 'none';

      let html = `<h2 class="text-2xl font-bold mb-1">🎮 Tailwind Play</h2>
      <p class="text-slate-400 text-sm mb-6">Type any Tailwind classes into the editor and see the preview update in real time.</p>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div class="section-card bg-slate-800/50 rounded-xl border border-slate-700/50 p-4 fade-in">
          <label class="text-xs text-slate-400 block mb-2">Element Type</label>
          <div class="flex flex-wrap gap-2 mb-4">
            ${['div','span','button','section','p','h1','img'].map(s =>
              `<button class="btn-option ${s==='div'?'active':''}" onclick="twPlayTag(this,'${s}')">${s}</button>`
            ).join('')}
          </div>
          <label class="text-xs text-slate-400 block mb-2">Content</label>
          <input id="twPlayContent" type="text" value="Hello Tailwind!" class="w-full bg-slate-800 text-sm text-slate-200 rounded-lg px-3 py-2 border border-slate-700 focus:border-blue-500 outline-none mb-4" oninput="twPlayUpdate()">
          <label class="text-xs text-slate-400 block mb-2">Tailwind Classes</label>
          <textarea id="twPlayInput" rows="4" class="w-full bg-slate-800 text-sm text-emerald-300 font-mono rounded-lg px-3 py-2 border border-slate-700 focus:border-blue-500 outline-none resize-vertical" placeholder="e.g. bg-blue-500 text-white p-4 rounded-xl shadow-lg">bg-blue-500 text-white p-4 rounded-xl shadow-lg</textarea>
          <button class="btn-option w-full mt-2 text-center" onclick="twPlayReset()">↺ Reset</button>
        </div>
        <div class="section-card bg-slate-800/50 rounded-xl border border-slate-700/50 p-4 fade-in">
          <label class="text-xs text-slate-400 block mb-2">Live Preview</label>
          <div class="bg-slate-900/70 rounded-lg p-4 border border-slate-700/30 flex items-center justify-center" style="min-height:160px">
            <div id="twPlayPreview" class="bg-blue-500 text-white p-4 rounded-xl shadow-lg transition-all duration-200">Hello Tailwind!</div>
          </div>
          <div class="mt-3">
            <label class="text-xs text-slate-400 block mb-1">Generated Code</label>
            <div class="code-block"><pre><code id="twPlayCode" class="text-sky-300 text-xs">${escapeHtml('<div class="bg-blue-500 text-white p-4 rounded-xl shadow-lg">Hello Tailwind!</div>')}</code></pre></div>
            <button class="btn-option w-full mt-2 text-center" onclick="twPlayCopy(this)">📋 Copy Code</button>
          </div>
        </div>
      </div>

      <div class="section-card bg-slate-800/50 rounded-xl border border-slate-700/50 p-4 md:p-6 mb-6 fade-in">
        <h3 class="text-sm font-semibold mb-2">💡 Try these combos</h3>
        <div class="flex flex-wrap gap-2">
          ${[
            ['Ring + Shadow', 'ring-2 ring-blue-400 shadow-lg rounded-xl p-6 bg-slate-800 text-white'],
            ['Gradient + Flex', 'bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold p-4 rounded-xl flex items-center gap-2'],
            ['Card', 'max-w-sm bg-white rounded-xl shadow-lg p-6 text-slate-800 border border-slate-200'],
            ['Badge', 'inline-flex items-center gap-1 bg-green-100 text-green-800 text-xs font-medium px-2.5 py-0.5 rounded-full'],
            ['Button', 'bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-lg transition-colors cursor-pointer'],
            ['Grid + Gap', 'grid grid-cols-3 gap-3 p-4 bg-slate-800 rounded-xl']
          ].map(([name, cls]) =>
            `<button class="btn-option text-xs" onclick="twPlayLoad('${cls.replace(/'/g, "\\'")}')">${name}</button>`
          ).join('')}
        </div>
      </div>`;

      sec.innerHTML = html;
      return sec;
    }

    window.twPlayTag = function(btn, tag) {
      const container = btn.closest('.section-card');
      container.querySelectorAll('.btn-option').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      twPlayUpdate();
    };
    window.twPlayUpdate = function() {
      const tag = document.querySelector('#section-twplay .btn-option.active')?.textContent || 'div';
      const classes = document.getElementById('twPlayInput')?.value || '';
      const content = document.getElementById('twPlayContent')?.value || '';
      const preview = document.getElementById('twPlayPreview');
      const code = document.getElementById('twPlayCode');
      if (!preview || !code) return;
      preview.className = classes + ' transition-all duration-200';
      if (tag === 'img') {
        preview.innerHTML = '';
        preview.className += ' w-24 h-24 object-cover rounded-xl';
        preview.style.background = 'linear-gradient(135deg,#667eea,#764ba2)';
        preview.title = 'img placeholder';
      } else {
        preview.textContent = content;
      }
      code.textContent = `<${tag} class="${classes}">${escapeHtml(content)}</${tag}>`;
    };
    window.twPlayReset = function() {
      document.getElementById('twPlayInput').value = 'bg-blue-500 text-white p-4 rounded-xl shadow-lg';
      document.getElementById('twPlayContent').value = 'Hello Tailwind!';
      document.querySelectorAll('#section-twplay .btn-option').forEach(b => b.classList.remove('active'));
      document.querySelector('#section-twplay .btn-option[onclick*="div"]')?.classList.add('active');
      twPlayUpdate();
    };
    window.twPlayLoad = function(cls) {
      document.getElementById('twPlayInput').value = cls;
      twPlayUpdate();
    };
    window.twPlayCopy = function(btn) {
      const code = document.getElementById('twPlayCode')?.textContent;
      if (!code) return;
      navigator.clipboard.writeText(code).then(() => {
        btn.textContent = '✓ Copied!';
        setTimeout(() => { btn.textContent = '📋 Copy Code'; }, 1500);
      });
    };

    // ===== INIT =====
    function init() {
      renderSidebar();
      buildAllSections();
      updateProgress();
      initDockObserver();

      // Init flexbox
      flexUpdate('direction', 'flex-row');
      flexUpdate('wrap', 'flex-nowrap');
      flexUpdate('justify', 'justify-start');
      flexUpdate('items', 'items-start');
      flexUpdate('content', 'content-start');
      flexUpdate('gap', 'gap-2');

      // Init grid
      gridUpdate('cols', 'grid-cols-2');
      gridUpdate('gap', 'gap-2');

      // Init spacing
      spacingUpdate();

      // Init color demo
      updateColorPreview();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
